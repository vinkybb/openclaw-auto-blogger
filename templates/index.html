<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Pipeline</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-gradient-1"></div>
        <div class="bg-gradient-2"></div>
        <div class="bg-noise"></div>
    </div>

    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="url(#logoGrad)" stroke="none"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#818cf8"/>
                                    <stop offset="100%" style="stop-color:#c084fc"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="logo-text">Blog Pipeline</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <span>工作台</span>
                </a>
                <a href="#" class="nav-item" onclick="showArticles(); return false;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    <span>文章库</span>
                </a>
                <a href="/dashboard" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span>仪表盘</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator" id="statusIndicator">
                    <div class="status-dot"></div>
                    <span class="status-text">就绪</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="topbar">
                <div class="topbar-left">
                    <h1 class="page-title">内容工作台</h1>
                    <p class="page-subtitle">从 RSS 源到发布，一站式内容流水线</p>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-ghost" onclick="loadRssSources()" title="刷新源">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- RSS 源选择区 -->
            <section class="section rss-section">
                <div class="section-header">
                    <div class="section-title-group">
                        <h2 class="section-title">
                            <span class="section-icon">📡</span>
                            RSS 源
                        </h2>
                        <span class="section-badge" id="sourceCount">0 个源</span>
                    </div>
                    <div class="section-actions">
                        <button class="btn btn-sm btn-ghost" onclick="toggleAllRss(true)">全选</button>
                        <button class="btn btn-sm btn-ghost" onclick="toggleAllRss(false)">清空</button>
                    </div>
                </div>
                <div id="rssGrid" class="source-grid">
                    <div class="skeleton-loader">
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                    </div>
                </div>
            </section>

            <!-- 控制面板 -->
            <section class="section control-section">
                <div class="control-card">
                    <div class="control-row">
                        <div class="control-group control-group-flex">
                            <div class="control-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M12 16v-4M12 8h.01"/>
                                </svg>
                            </div>
                            <input type="text" id="customTopic" class="input-field" placeholder="输入自定义话题，多个用逗号分隔...">
                        </div>
                        <div class="control-group control-group-small">
                            <label class="control-label">文章数量</label>
                            <div class="number-input">
                                <button class="number-btn" onclick="adjustCount(-1)">−</button>
                                <input type="number" id="articleCount" class="input-field" value="3" min="1" max="10">
                                <button class="number-btn" onclick="adjustCount(1)">+</button>
                            </div>
                        </div>
                        <button class="btn btn-primary btn-lg" onclick="startPipeline()" id="startBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            <span>启动流水线</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- 执行进度区 -->
            <section class="section progress-section" id="progressSection" style="display: none;">
                <div class="section-header">
                    <h2 class="section-title">
                        <span class="section-icon">🚀</span>
                        执行进度
                    </h2>
                    <button class="btn btn-sm btn-danger" onclick="cancelPipeline()" id="cancelBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        </svg>
                        取消
                    </button>
                </div>
                <div class="progress-card">
                    <div id="stageIndicator" class="stage-indicator">
                        <div class="stage-line"></div>
                    </div>
                    <div id="logContainer" class="log-container"></div>
                </div>
            </section>

            <!-- 已生成文章区 -->
            <section class="section articles-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <span class="section-icon">✨</span>
                        已生成文章
                    </h2>
                    <span class="section-badge" id="articleCountBadge">0 篇</span>
                </div>
                <div id="articlesContainer" class="articles-grid">
                    <div class="empty-state">
                        <div class="empty-illustration">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="12" y1="18" x2="12" y2="12"/>
                                <line x1="9" y1="15" x2="15" y2="15"/>
                            </svg>
                        </div>
                        <h3 class="empty-title">暂无文章</h3>
                        <p class="empty-desc">选择 RSS 源并启动流水线来生成文章</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadRssSources();
            loadArticles();
        });
    </script>
</body>
</html>
