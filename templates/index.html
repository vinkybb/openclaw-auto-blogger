<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客流水线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { color: #8892b0; font-size: 1.1em; }
        
        .status-bar {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .status-item { flex: 1; }
        .status-value { font-size: 2em; font-weight: bold; color: #64ffda; }
        .status-label { color: #8892b0; font-size: 0.9em; }
        
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.3); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .running { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .section { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .section h2 { margin-bottom: 20px; color: #64ffda; font-size: 1.2em; }
        
        .log-container {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85em;
        }
        .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-time { color: #6e7681; margin-right: 10px; }
        .log-info { color: #58a6ff; }
        .log-success { color: #3fb950; }
        .log-error { color: #f85149; }
        
        .articles { display: grid; gap: 15px; }
        .article {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .article:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .article h3 { margin-bottom: 8px; color: #fff; }
        .article-meta { color: #8892b0; font-size: 0.85em; }
        .article-preview { margin-top: 10px; color: #a8b2d1; font-size: 0.9em; line-height: 1.5; }
        
        .empty-state { text-align: center; padding: 40px; color: #6e7681; }
        .empty-state i { font-size: 3em; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 博客流水线</h1>
            <p>自动抓取 · AI扩写 · 自动发布</p>
        </header>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-value" id="stat-rss">0</div>
                <div class="status-label">RSS源</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="stat-articles">0</div>
                <div class="status-label">已生成</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="stat-published">0</div>
                <div class="status-label">已发布</div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="btn-run" onclick="runPipeline()">
                <span>▶</span> 一键运行
            </button>
            <button class="btn btn-secondary" id="btn-fetch" onclick="fetchRSS()">
                <span>📡</span> 抓取RSS
            </button>
            <button class="btn btn-secondary" id="btn-gen" onclick="generateContent()">
                <span>✍️</span> 生成内容
            </button>
            <button class="btn btn-secondary" id="btn-publish" onclick="publishAll()">
                <span>📤</span> 发布文章
            </button>
        </div>
        
        <div class="section">
            <h2>📋 运行日志</h2>
            <div class="log-container" id="logs">
                <div class="empty-state">等待执行...</div>
            </div>
        </div>
        
        <div class="section">
            <h2>📄 最近文章</h2>
            <div class="articles" id="articles">
                <div class="empty-state">暂无文章，点击"一键运行"开始</div>
            </div>
        </div>
    </div>
    
    <script>
        let isRunning = false;
        
        async function api(endpoint, method = 'GET', data = null) {
            const opts = { 
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (data) {
                opts.body = JSON.stringify(data);
            }
            const res = await fetch('/api' + endpoint, opts);
            return res.json();
        }
        
        function log(msg, type = 'info') {
            const container = document.getElementById('logs');
            const time = new Date().toLocaleTimeString('zh-CN');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}">${msg}</span>`;
            
            if (container.querySelector('.empty-state')) {
                container.innerHTML = '';
            }
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        function setRunning(state) {
            isRunning = state;
            document.querySelectorAll('.btn').forEach(btn => btn.disabled = state);
            if (state) {
                document.getElementById('btn-run').classList.add('running');
            } else {
                document.getElementById('btn-run').classList.remove('running');
            }
        }
        
        async function runPipeline() {
            if (isRunning) return;
            setRunning(true);
            log('🚀 启动完整流水线...', 'info');
            
            try {
                const result = await api('/pipeline', 'POST', {});
                if (result.error) throw new Error(result.error);
                
                log('✅ 流水线完成!', 'success');
                if (result.articles) {
                    log(`📝 生成 ${result.articles.length} 篇文章`, 'info');
                }
                if (result.published) {
                    log(`📤 发布 ${result.published} 篇文章`, 'success');
                }
                loadArticles();
            } catch (e) {
                log(`❌ 错误: ${e.message}`, 'error');
            }
            
            setRunning(false);
        }
        
        async function fetchRSS() {
            if (isRunning) return;
            setRunning(true);
            log('📡 抓取RSS源...', 'info');
            
            try {
                const result = await api('/fetch', 'POST', { max_items: 10 });
                if (result.error) throw new Error(result.error);
                log(`✅ 抓取 ${result.articles?.length || 0} 篇文章`, 'success');
            } catch (e) {
                log(`❌ 错误: ${e.message}`, 'error');
            }
            
            setRunning(false);
        }
        
        async function generateContent() {
            if (isRunning) return;
            setRunning(true);
            log('✍️ 生成内容...', 'info');
            
            try {
                const result = await api('/expand', 'POST', {});
                if (result.error) throw new Error(result.error);
                log(`✅ 内容生成完成`, 'success');
                loadArticles();
            } catch (e) {
                log(`❌ 错误: ${e.message}`, 'error');
            }
            
            setRunning(false);
        }
        
        async function publishAll() {
            if (isRunning) return;
            setRunning(true);
            log('📤 发布文章...', 'info');
            
            try {
                const result = await api('/publish', 'POST', {});
                if (result.error) throw new Error(result.error);
                log(`✅ 发布 ${result.published || 0} 篇文章`, 'success');
            } catch (e) {
                log(`❌ 错误: ${e.message}`, 'error');
            }
            
            setRunning(false);
        }
        
        async function loadArticles() {
            try {
                const result = await api('/articles');
                const container = document.getElementById('articles');
                
                if (!result.articles || result.articles.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无文章</div>';
                    return;
                }
                
                container.innerHTML = result.articles.map(a => `
                    <div class="article">
                        <h3>${a.title || '无标题'}</h3>
                        <div class="article-meta">${a.date || ''} · ${a.status || '草稿'}</div>
                        <div class="article-preview">${(a.preview || '').substring(0, 150)}...</div>
                    </div>
                `).join('');
                
                document.getElementById('stat-articles').textContent = result.articles.length;
            } catch (e) {
                console.error(e);
            }
        }
        
        async function loadStatus() {
            try {
                const result = await api('/status');
                document.getElementById('stat-rss').textContent = result.rss_sources || 0;
            } catch (e) {
                console.error(e);
            }
        }
        
        // 初始化
        loadStatus();
        loadArticles();
    </script>
</body>
</html>
