<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章预览与编辑</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/preview.css">
</head>
<body>
    <div class="preview-app">
        <!-- 顶部导航 -->
        <header class="preview-header">
            <div class="header-left">
                <a href="/" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    返回工作台
                </a>
            </div>
            <div class="header-center">
                <input type="text" id="articleTitle" class="title-input" placeholder="文章标题">
            </div>
            <div class="header-right">
                <button class="btn btn-ghost" onclick="saveArticle()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    保存
                </button>
                <button class="btn btn-primary" onclick="publishAndReturn()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                    发布
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="preview-main">
            <!-- 左侧编辑区 -->
            <div class="editor-panel">
                <div class="editor-toolbar">
                    <div class="toolbar-group">
                        <button class="toolbar-btn" onclick="insertFormat('**', '**')" title="加粗">
                            <strong>B</strong>
                        </button>
                        <button class="toolbar-btn" onclick="insertFormat('*', '*')" title="斜体">
                            <em>I</em>
                        </button>
                        <button class="toolbar-btn" onclick="insertFormat('## ', '')" title="标题">
                            H
                        </button>
                        <button class="toolbar-btn" onclick="insertFormat('[', ']()')" title="链接">
                            🔗
                        </button>
                    </div>
                    <div class="toolbar-info">
                        <span id="wordCount">0 字</span>
                        <span class="separator">|</span>
                        <span id="selectionInfo">未选中</span>
                    </div>
                </div>
                <div class="editor-container">
                    <textarea id="editor" class="editor-textarea" placeholder="在这里编辑文章内容..."></textarea>
                </div>
            </div>

            <!-- 分隔线 -->
            <div class="divider">
                <div class="divider-line"></div>
            </div>

            <!-- 右侧 AI 对话区 -->
            <div class="ai-panel">
                <div class="ai-header">
                    <div class="ai-avatar">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" fill="url(#aiGrad)" stroke="none"/>
                            <path d="M12 8v4M12 16h.01" stroke="white" stroke-width="2" stroke-linecap="round"/>
                            <defs>
                                <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#818cf8"/>
                                    <stop offset="100%" style="stop-color:#c084fc"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="ai-title">
                        <h3>AI 助手</h3>
                        <p>选中文字后发送修改请求</p>
                    </div>
                </div>

                <div class="ai-chat-container" id="chatContainer">
                    <div class="chat-welcome">
                        <div class="welcome-icon">✨</div>
                        <p>选中左侧文字，告诉我你想怎么修改</p>
                        <div class="welcome-examples">
                            <button class="example-btn" onclick="useExample('改写得更正式一些')">
                                改写得更正式
                            </button>
                            <button class="example-btn" onclick="useExample('扩展这段内容')">
                                扩展内容
                            </button>
                            <button class="example-btn" onclick="useExample('简化表达')">
                                简化表达
                            </button>
                        </div>
                    </div>
                </div>

                <div class="ai-input-area">
                    <div class="selected-preview" id="selectedPreview" style="display: none;">
                        <div class="selected-label">已选中:</div>
                        <div class="selected-text" id="selectedTextPreview"></div>
                    </div>
                    <div class="input-row">
                        <textarea id="aiInput" class="ai-input" placeholder="描述你的修改需求..." rows="2"></textarea>
                        <button class="btn btn-primary btn-send" onclick="sendAIRequest()" id="sendBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/preview.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initPreview();
        });
    </script>
</body>
</html>
