ai:
  enabled: true
  model: custom-coding-dashscope-aliyuncs-com/glm-5
  rewrite_enabled: false
  summary_length: 200
browser:
  cdp_port: 9222
  headless: true
  timeout: 30
logging:
  file: /root/home/blog-pipeline/logs/pipeline.log
  level: INFO
output:
